  <rect x="984" y="592" width="90" height="16" rx="8" fill="#fcba28" opacity="0.15"/>
  <rect x="986" y="597" width="86" height="4" rx="1" fill="#fcba28" opacity="0.7"/>
  <rect x="984" y="614" width="56" height="4" rx="1" fill="#fcba28" opacity="0.5"/>
