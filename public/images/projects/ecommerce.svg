  <!-- Browser top bar -->
  <rect x="60" y="24" width="700" height="44" rx="10" fill="#141414"/>
  <rect x="60" y="54" width="700" height="14" fill="#141414"/>
  <rect x="60" y="68" width="700" height="1" fill="#383c44"/>
