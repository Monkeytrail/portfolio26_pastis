  <rect x="818" y="568" width="50" height="4" rx="1" fill="#909498" opacity="0.45"/>
  <!-- A variant -->
  <rect x="818" y="582" width="140" height="52" rx="4" fill="#1e1e1e" stroke="#383c44" stroke-width="1"/>
