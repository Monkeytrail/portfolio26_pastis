  <text x="200" y="289" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#909498" text-anchor="middle" font-weight="600">AGV-04</text>

  <!-- Zone labels -->
  <text x="220" y="80" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#383c44" text-anchor="middle" letter-spacing="1">ZONE A</text>
  <text x="500" y="80" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#383c44" text-anchor="middle" letter-spacing="1">ZONE B</text>

