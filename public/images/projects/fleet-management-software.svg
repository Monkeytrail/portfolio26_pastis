  <rect x="912" y="156" width="176" height="6" rx="3" fill="#383c44"/>
  <rect x="912" y="156" width="140" height="6" rx="3" fill="#fcba28" opacity="0.7"/>
  <text x="1092" y="162" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#909498" text-anchor="end">12/15</text>

  <line x1="912" y1="178" x2="1108" y2="178" stroke="#383c44" stroke-width="1"/>

  <!-- Individual vehicle statuses -->
  <text x="912" y="200" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#909498" letter-spacing="1">VEHICLES</text>

  <!-- AGV-01 -->
  <rect x="912" y="210" width="176" height="36" rx="4" fill="#262522"/>
  <circle cx="928" cy="228" r="5" fill="#fcba28"/>
  <text x="940" y="224" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#f9f4da" font-weight="500">AGV-01</text>
  <text x="940" y="238" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#fcba28">Moving · Zone A→B</text>
  <text x="1082" y="228" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#fcba28" text-anchor="end">87%</text>
  <!-- AGV-02 -->
  <rect x="912" y="252" width="176" height="36" rx="4" fill="#262522"/>
  <circle cx="928" cy="270" r="5" fill="#fcba28" opacity="0.5"/>
  <text x="940" y="266" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#f9f4da" font-weight="500">AGV-02</text>
  <text x="940" y="280" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#909498">Charging · Station 1</text>
  <text x="1082" y="270" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#909498" text-anchor="end">34%</text>
  <!-- AGV-03 -->
  <rect x="912" y="294" width="176" height="36" rx="4" fill="#262522"/>
  <circle cx="928" cy="312" r="5" fill="#fc7428"/>
  <text x="940" y="308" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#f9f4da" font-weight="500">AGV-03</text>
  <text x="940" y="322" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#fc7428">Moving · Dock D</text>
  <text x="1082" y="312" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#fc7428" text-anchor="end">92%</text>
  <!-- AGV-04 -->
  <rect x="912" y="336" width="176" height="36" rx="4" fill="#262522"/>
  <circle cx="928" cy="354" r="5" fill="#383c44"/>
  <text x="940" y="350" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#909498" font-weight="500">AGV-04</text>
  <text x="940" y="364" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#909498">Standby · Zone A</text>
  <text x="1082" y="354" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#909498" text-anchor="end">100%</text>

  <line x1="912" y1="386" x2="1108" y2="386" stroke="#383c44" stroke-width="1"/>

  <!-- Throughput -->
