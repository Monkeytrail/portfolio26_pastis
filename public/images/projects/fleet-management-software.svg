  <text x="912" y="444" font-family="Inter, system-ui, sans-serif" font-size="36" fill="#f9f4da" font-weight="700">284</text>
  <text x="912" y="464" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#909498">picks / hour</text>

  <line x1="912" y1="480" x2="1108" y2="480" stroke="#383c44" stroke-width="1"/>

  <!-- Alerts -->
  <text x="912" y="502" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#909498" letter-spacing="1">ACTIVE ALERTS</text>
  <rect x="912" y="512" width="176" height="32" rx="4" fill="#fc7428" opacity="0.1" stroke="#fc7428" stroke-width="1"/>
  <text x="924" y="526" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#fc7428" font-weight="500">Dock B blocked</text>
  <text x="924" y="538" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#fc7428" opacity="0.7">AGV rerouted · 2 min ago</text>
  <rect x="912" y="550" width="176" height="28" rx="4" fill="#262522"/>
  <text x="924" y="568" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#909498">All systems nominal</text>

  <!-- Label band -->
  <rect x="0" y="636" width="1200" height="39" fill="#0d0d0d"/>
  <line x1="0" y1="636" x2="1200" y2="636" stroke="#1e1e1e" stroke-width="1"/>
  <text x="72" y="660" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#909498" letter-spacing="1.5" font-weight="500">FLEET MANAGEMENT SOFTWARE</text>
  <text x="368" y="660" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#383c44" letter-spacing="1">·  KION  ·  2026</text>
  <rect x="72" y="636" width="80" height="3" fill="#fcba28"/>
  <rect x="156" y="636" width="40" height="3" fill="#fc7428"/>
