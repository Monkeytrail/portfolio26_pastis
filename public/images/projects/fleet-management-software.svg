<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="floorTile" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="#111111"/>
      <rect width="79" height="79" fill="#121212" stroke="#1a1a1a" stroke-width="1"/>
    </pattern>
    <marker id="arrowY" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <polygon points="0,0 6,3 0,6" fill="#fcba28" opacity="0.8"/>
    </marker>
    <marker id="arrowO" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <polygon points="0,0 6,3 0,6" fill="#fc7428" opacity="0.7"/>
    </marker>
    <linearGradient id="fleetBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#fleetBg)"/>

  <!-- Warehouse floor plan — top-down view -->
  <!-- Floor area -->
  <rect x="72" y="64" width="800" height="524" rx="4" fill="url(#floorTile)"/>

  <!-- Rack rows -->
  <!-- Row 1 -->
  <rect x="112" y="96" width="40" height="200" rx="2" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="164" y="96" width="40" height="200" rx="2" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="216" y="96" width="40" height="200" rx="2" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="268" y="96" width="40" height="200" rx="2" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="320" y="96" width="40" height="200" rx="2" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Row 2 -->
  <rect x="112" y="344" width="40" height="200" rx="2" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="164" y="344" width="40" height="200" rx="2" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="216" y="344" width="40" height="200" rx="2" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="268" y="344" width="40" height="200" rx="2" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="320" y="344" width="40" height="200" rx="2" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Row 3 -->
  <rect x="420" y="96" width="40" height="200" rx="2" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="472" y="96" width="40" height="200" rx="2" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="524" y="96" width="40" height="200" rx="2" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="576" y="96" width="40" height="200" rx="2" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Row 4 -->
  <rect x="420" y="344" width="40" height="200" rx="2" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="472" y="344" width="40" height="200" rx="2" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="524" y="344" width="40" height="200" rx="2" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="576" y="344" width="40" height="200" rx="2" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Charging stations top-right -->
  <rect x="660" y="96" width="60" height="48" rx="3" fill="#262522" stroke="#fcba28" stroke-width="1"/>
  <text x="690" y="116" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#fcba28" text-anchor="middle">⚡</text>
  <text x="690" y="132" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#fcba28" text-anchor="middle">CHARGE</text>
  <rect x="728" y="96" width="60" height="48" rx="3" fill="#262522" stroke="#383c44" stroke-width="1"/>
  <text x="758" y="116" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#909498" text-anchor="middle">⚡</text>
  <text x="758" y="132" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#909498" text-anchor="middle">EMPTY</text>

  <!-- Dock doors right side -->
  <rect x="800" y="200" width="72" height="36" rx="2" fill="#1e1e1e" stroke="#383c44" stroke-width="1"/>
  <text x="836" y="223" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#909498" text-anchor="middle">DOCK A</text>
  <rect x="800" y="248" width="72" height="36" rx="2" fill="#1e1e1e" stroke="#fcba28" stroke-width="1"/>
  <text x="836" y="271" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#fcba28" text-anchor="middle">DOCK B</text>
  <rect x="800" y="388" width="72" height="36" rx="2" fill="#1e1e1e" stroke="#383c44" stroke-width="1"/>
  <text x="836" y="411" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#909498" text-anchor="middle">DOCK C</text>
  <rect x="800" y="436" width="72" height="36" rx="2" fill="#1e1e1e" stroke="#fc7428" stroke-width="1"/>
  <text x="836" y="459" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#fc7428" text-anchor="middle">DOCK D</text>

  <!-- Navigation paths (AGV routes) -->
  <!-- Path 1: AGV1 route - yellow -->
  <polyline points="380,196 640,196 640,326 796,326" fill="none" stroke="#fcba28" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5" marker-end="url(#arrowY)"/>

  <!-- Path 2: AGV2 route - yellow lighter -->
  <polyline points="620,444 620,326 796,326" fill="none" stroke="#fcba28" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.35" marker-end="url(#arrowY)"/>

  <!-- Path 3: AGV3 route - orange -->
  <polyline points="380,444 640,444 640,454 796,454" fill="none" stroke="#fc7428" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5" marker-end="url(#arrowO)"/>

  <!-- Path 4: return route AGV4 - grey -->
  <polyline points="640,196 640,120 692,120" fill="none" stroke="#383c44" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/>

  <!-- AGV Vehicles (simplified top-down icons) -->

  <!-- AGV 1 — yellow, active, moving -->
  <g transform="translate(460, 178)">
    <rect x="-14" y="-10" width="28" height="20" rx="3" fill="#fcba28"/>
    <rect x="-8" y="-14" width="16" height="8" rx="2" fill="#fcba28" opacity="0.7"/>
    <circle cx="0" cy="0" r="4" fill="#0d0d0d"/>
    <!-- direction indicator -->
    <polygon points="16,-3 22,0 16,3" fill="#0d0d0d" opacity="0.5"/>
  </g>
  <!-- AGV 1 glow -->
  <circle cx="460" cy="196" r="20" fill="#fcba28" opacity="0.08"/>
  <!-- AGV 1 label -->
  <rect x="436" y="158" width="48" height="14" rx="7" fill="#0d0d0d" stroke="#fcba28" stroke-width="1"/>
  <text x="460" y="169" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#fcba28" text-anchor="middle" font-weight="600">AGV-01</text>

