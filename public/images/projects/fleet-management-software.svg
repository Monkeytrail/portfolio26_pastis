  <g transform="translate(690, 120)">
    <rect x="-12" y="-8" width="24" height="16" rx="3" fill="#fcba28" opacity="0.7"/>
    <circle cx="0" cy="0" r="3" fill="#0d0d0d"/>
  </g>
  <rect x="666" y="102" width="48" height="14" rx="7" fill="#0d0d0d" stroke="#fcba28" stroke-width="1"/>
  <text x="690" y="113" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#fcba28" text-anchor="middle" font-weight="600">AGV-02</text>

  <!-- AGV 3 — orange, moving toward dock D -->
  <g transform="translate(520, 444)">
    <rect x="-14" y="-10" width="28" height="20" rx="3" fill="#fc7428"/>
    <rect x="-8" y="-14" width="16" height="8" rx="2" fill="#fc7428" opacity="0.7"/>
    <circle cx="0" cy="0" r="4" fill="#0d0d0d"/>
    <polygon points="16,-3 22,0 16,3" fill="#0d0d0d" opacity="0.5"/>
  </g>
  <circle cx="520" cy="444" r="20" fill="#fc7428" opacity="0.07"/>
  <rect x="496" y="424" width="48" height="14" rx="7" fill="#0d0d0d" stroke="#fc7428" stroke-width="1"/>
  <text x="520" y="435" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#fc7428" text-anchor="middle" font-weight="600">AGV-03</text>

