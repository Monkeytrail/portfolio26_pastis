  <!-- Main browser window — Hero section -->
  <rect x="72" y="72" width="480" height="340" rx="8" fill="#1e1e1e" stroke="#383c44" stroke-width="1"/>
  <!-- Browser chrome -->
  <rect x="72" y="72" width="480" height="32" rx="8" fill="#262522"/>
  <rect x="72" y="98" width="480" height="6" fill="#262522"/>
  <circle cx="96" cy="88" r="5" fill="#383c44"/>
  <circle cx="116" cy="88" r="5" fill="#383c44"/>
  <circle cx="136" cy="88" r="5" fill="#383c44"/>
  <rect x="156" y="80" width="280" height="16" rx="8" fill="#1e1e1e"/>
