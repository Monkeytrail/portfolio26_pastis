<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="seaBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0c0f"/>
      <stop offset="60%" stop-color="#0d0f12"/>
      <stop offset="100%" stop-color="#0a0d14"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1520" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0a0c0f" stop-opacity="0"/>
    </linearGradient>
    <pattern id="wavePattern" width="120" height="20" patternUnits="userSpaceOnUse">
      <path d="M0,10 Q30,2 60,10 Q90,18 120,10" fill="none" stroke="#1a2535" stroke-width="1.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#seaBg)"/>

  <!-- Horizon water area -->
  <rect x="0" y="430" width="1200" height="245" fill="#0a0d14" opacity="0.5"/>
  <rect x="0" y="440" width="1200" height="195" fill="url(#wavePattern)" opacity="0.5"/>

  <!-- Horizon line -->
  <line x1="0" y1="440" x2="1200" y2="440" stroke="#1a2535" stroke-width="1"/>

  <!-- Stars / dots in the sky -->
  <circle cx="120" cy="80" r="1.5" fill="#f9f4da" opacity="0.3"/>
  <circle cx="240" cy="40" r="1" fill="#f9f4da" opacity="0.4"/>
  <circle cx="380" cy="100" r="1.5" fill="#f9f4da" opacity="0.25"/>
  <circle cx="480" cy="60" r="1" fill="#f9f4da" opacity="0.3"/>
  <circle cx="1000" cy="90" r="1.5" fill="#f9f4da" opacity="0.3"/>
  <circle cx="1100" cy="50" r="1" fill="#f9f4da" opacity="0.4"/>
  <circle cx="900" cy="120" r="1.5" fill="#f9f4da" opacity="0.2"/>
  <circle cx="1050" cy="140" r="1" fill="#f9f4da" opacity="0.3"/>

  <!-- Compass rose — center background element -->
  <g transform="translate(600, 260)" opacity="0.07">
    <circle cx="0" cy="0" r="160" fill="none" stroke="#fcba28" stroke-width="1"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#fcba28" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#fcba28" stroke-width="0.5"/>
    <!-- N -->
    <polygon points="0,-160 -12,-120 0,-100 12,-120" fill="#fcba28"/>
    <!-- S -->
    <polygon points="0,160 -8,120 0,100 8,120" fill="#fcba28" opacity="0.4"/>
    <!-- E -->
    <polygon points="160,0 120,-8 100,0 120,8" fill="#fcba28" opacity="0.4"/>
    <!-- W -->
    <polygon points="-160,0 -120,-8 -100,0 -120,8" fill="#fcba28" opacity="0.4"/>
    <!-- Intercardinal points -->
    <polygon points="113,113 95,85 85,95" fill="#fcba28" opacity="0.3"/>
    <polygon points="-113,113 -95,85 -85,95" fill="#fcba28" opacity="0.3"/>
    <polygon points="113,-113 95,-85 85,-95" fill="#fcba28" opacity="0.3"/>
    <polygon points="-113,-113 -95,-85 -85,-95" fill="#fcba28" opacity="0.3"/>
    <circle cx="0" cy="0" r="12" fill="#fcba28" opacity="0.5"/>
    <circle cx="0" cy="0" r="5" fill="#fcba28"/>
  </g>

  <!-- Prominent compass label -->
  <text x="600" y="112" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#fcba28" text-anchor="middle" font-weight="700" opacity="0.15">N</text>

  <!-- Ship silhouette on water -->
  <!-- Hull -->
  <path d="M280,430 L300,390 L900,390 L920,430 Z" fill="#1a1a2a" stroke="#262840" stroke-width="1"/>
  <!-- Deck superstructure -->
  <rect x="480" y="330" width="240" height="60" rx="2" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
  <rect x="540" y="280" width="120" height="50" rx="2" fill="#121218" stroke="#1e1e30" stroke-width="1"/>
  <!-- Bridge windows -->
  <rect x="556" y="292" width="20" height="14" rx="1" fill="#fcba28" opacity="0.3"/>
  <rect x="582" y="292" width="20" height="14" rx="1" fill="#fcba28" opacity="0.2"/>
  <rect x="608" y="292" width="20" height="14" rx="1" fill="#fcba28" opacity="0.3"/>
  <!-- Mast -->
  <line x1="600" y1="180" x2="600" y2="280" stroke="#262840" stroke-width="3"/>
  <!-- Radar/antenna -->
  <line x1="560" y1="190" x2="640" y2="190" stroke="#1e2030" stroke-width="2"/>
  <circle cx="600" cy="185" r="4" fill="#fcba28" opacity="0.4"/>
  <!-- Port light (red = left) -->
  <circle cx="282" cy="410" r="4" fill="#fc7428" opacity="0.7"/>
  <!-- Starboard light -->
  <circle cx="918" cy="410" r="4" fill="#fcba28" opacity="0.6"/>
  <!-- Funnel / chimney -->
  <rect x="580" y="250" width="40" height="30" rx="2" fill="#0d0d18" stroke="#1e1e30" stroke-width="1"/>
