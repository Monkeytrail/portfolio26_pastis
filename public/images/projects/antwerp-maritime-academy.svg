  <circle cx="600" cy="240" r="8" fill="#1a1a2a" opacity="0.5"/>
  <circle cx="608" cy="225" r="10" fill="#141420" opacity="0.3"/>
  <circle cx="596" cy="212" r="7" fill="#0d0d18" opacity="0.2"/>
  <!-- Water reflection -->
  <path d="M280,430 L300,445 L900,445 L920,430 Z" fill="#0a0d14" opacity="0.6"/>

