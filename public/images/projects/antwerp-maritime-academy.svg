  <text x="882" y="411" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#f9f4da" text-anchor="middle">Scheepvaart</text>
  <rect x="956" y="392" width="132" height="28" rx="4" fill="#fcba28" opacity="0.15" stroke="#fcba28" stroke-width="1"/>
  <text x="1022" y="411" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#fcba28" text-anchor="middle">Logistiek</text>

  <rect x="796" y="444" width="316" height="60" fill="#1e1e1e" stroke-bottom="#383c44"/>
  <text x="816" y="464" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#f9f4da" font-weight="500">Nautische wetenschappen</text>
  <text x="816" y="480" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#909498">3 jaar · Bachelor</text>
  <text x="1096" y="474" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#fcba28" text-anchor="end">→</text>

  <rect x="796" y="516" width="316" height="60" fill="#1e1e1e"/>
  <text x="816" y="536" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#f9f4da" font-weight="500">Maritieme logistiek</text>
  <text x="816" y="552" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#909498">3 jaar · Bachelor</text>
  <text x="1096" y="546" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#909498" text-anchor="end">→</text>

  <!-- Home indicator -->
