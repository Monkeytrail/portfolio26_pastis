<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f2f5"/>
      <stop offset="60%" stop-color="#e8ecf1"/>
      <stop offset="100%" stop-color="#dde4ee"/>
    </linearGradient>
    <linearGradient id="waterLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dde4ee" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f0f2f5" stop-opacity="0"/>
    </linearGradient>
    <pattern id="wavePatternLight" width="120" height="20" patternUnits="userSpaceOnUse">
      <path d="M0,10 Q30,2 60,10 Q90,18 120,10" fill="none" stroke="#cfd8e6" stroke-width="1.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#skyBg)"/>

  <!-- Horizon water area -->
  <rect x="0" y="430" width="1200" height="245" fill="#dde4ee" opacity="0.5"/>
  <rect x="0" y="440" width="1200" height="195" fill="url(#wavePatternLight)" opacity="0.5"/>

  <!-- Horizon line -->
  <line x1="0" y1="440" x2="1200" y2="440" stroke="#cfd8e6" stroke-width="1"/>

  <!-- Subtle sky dots / clouds -->
  <circle cx="120" cy="80" r="20" fill="#e8ecf1" opacity="0.6"/>
  <circle cx="160" cy="72" r="28" fill="#edf0f4" opacity="0.5"/>
  <circle cx="380" cy="100" r="18" fill="#e8ecf1" opacity="0.4"/>
  <circle cx="1000" cy="90" r="22" fill="#e8ecf1" opacity="0.5"/>
  <circle cx="1050" cy="78" r="16" fill="#edf0f4" opacity="0.4"/>

  <!-- Compass rose — center background element -->
